<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Road Predictor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        body {
            background: url('https://alxyarb.github.io/my-tma/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            justify-content: center;
            position: absolute;
            top: 0; left: 0;
            transition: opacity 0.5s ease;
        }
        .screen.active { display: flex; }
        .backdrop { backdrop-filter: blur(8px); background: rgba(0,0,0,0.7); }

        h2 {
            margin-bottom: 30px; 
            text-align: center;
            font-size: 24px;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
            text-transform: uppercase;
        }

        .lang-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            width: 90%; 
            max-width: 400px; 
        }
        .lang-btn { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; 
            padding: 18px 10px; 
            font-size: 16px; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
        }
        .lang-btn span { font-size: 24px; } /* Размер флага */
        .lang-btn.selected { 
            background: rgba(255, 204, 0, 0.2); 
            border-color: #ffcc00; 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); 
            transform: scale(1.02); 
        }

        .continue-btn { margin-top: 30px; background: #333; color: #777; border: none; padding: 16px 50px; font-size: 18px; font-weight: 900; border-radius: 40px; cursor: not-allowed; transition: all 0.3s; text-transform: uppercase; }
        .continue-btn.active { background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%); color: #1a1d29; cursor: pointer; box-shadow: 0 0 20px rgba(255, 165, 0, 0.5); }

        .header h1 { font-size: 22px; margin: 0; color: #ffcc00; text-shadow: 0 0 15px rgba(255,204,0,0.5); text-transform: uppercase; text-align: center; }
        
        .mode-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 5px; }
        .mode-label { font-size: 12px; color: #aaa; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        
        /* ИСПРАВЛЕННЫЙ ВЫБОР РЕЖИМА */
        .mode-select { 
            background: #1a1a1a; 
            border: 2px solid #ffcc00; 
            color: white; 
            padding: 12px 20px; 
            font-size: 18px; 
            font-weight: 900; 
            border-radius: 12px; 
            text-align: center; 
            width: 200px;
            outline: none;
        }
        .mode-select option { 
            background: #1a1a1a; 
            color: white; 
        }

        .roulette-wrapper { width: 100%; height: 130px; overflow: hidden; position: relative; background: rgba(0, 0, 0, 0.5); border-top: 2px solid #ffcc00; border-bottom: 2px solid #ffcc00; display: flex; align-items: center; }
        .marker { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: #ff0000; transform: translateX(-50%); z-index: 5; box-shadow: 0 0 10px red; }
        .card { min-width: 140px; height: 90px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 20px; font-weight: 900; flex-shrink: 0; }
        .card.winner { background: #ffcc00; border: 3px solid white; transform: scale(1.05); }

        .signal-box { 
            position: relative; 
            width: 220px; 
            height: 220px; 
            background: rgba(0, 0, 0, 0.7); 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 4px solid rgba(255, 204, 0, 0.4); 
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-container {
            display: none;
            width: 70%;
            height: 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid #ffcc00;
        }
        .progress-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.1s linear; }
        .progress-text { display: none; font-size: 10px; color: #ffcc00; margin-top: 5px; font-weight: bold; }

        #coefficient { font-size: 50px; font-weight: 900; color: #fff; }
        .result-success { color: #4cd137 !important; text-shadow: 0 0 15px #4cd137; }
        
        .btn-signal { background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%); border: none; padding: 16px 0; width: 85%; font-size: 20px; font-weight: 900; color: #1a1d29; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 0 #cc7a00; }
        .btn-signal:disabled { opacity: 0.5; box-shadow: none; }
    </style>
</head>
<body>

    <div id="language-screen" class="screen backdrop active">
        <h2 id="lang-title">SELECT LANGUAGE</h2>
        <div class="lang-grid">
            <button class="lang-btn" onclick="selectLang('en', this)"><span>🇺🇸</span> English</button>
            <button class="lang-btn" onclick="selectLang('es', this)"><span>🇪🇸</span> Español</button>
            <button class="lang-btn" onclick="selectLang('pl', this)"><span>🇵🇱</span> Polski</button>
            <button class="lang-btn" onclick="selectLang('ua', this)"><span>🇺🇦</span> Українська</button>
            <button class="lang-btn" onclick="selectLang('kz', this)"><span>🇰🇿</span> Қазақша</button>
            <button class="lang-btn" onclick="selectLang('ru', this)"><span>🇷🇺</span> Русский</button>
        </div>
        <button id="continue-btn" class="continue-btn" onclick="checkHistoryAndProceed()">CONTINUE</button>
    </div>

    <div id="roulette-screen" class="screen backdrop">
        <h2 id="roulette-header">FREE BOT FOR:</h2>
        <div class="roulette-wrapper">
            <div class="marker"></div>
            <div class="roulette-strip" id="strip"></div>
        </div>
        <button class="spin-btn" id="spin-btn-text" onclick="startSpin()">SPIN</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="header"><h1>Chicken Road</h1><p style="text-align:center; color:#ccc; font-size:10px;">AI PREDICTOR v11.0</p></div>
        <div class="mode-container">
            <div id="mode-label" class="mode-label">SELECT MODE</div>
            <select id="mode-select" class="mode-select">
                <option value="easy">EASY</option>
                <option value="medium">MEDIUM</option>
                <option value="hard">HARD</option>
                <option value="hardcore">HARDCORE</option>
            </select>
        </div>
        <div class="signal-box" id="signalBox">
            <div id="coefficient">x0.00</div>
            <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
            <div class="progress-text" id="progressText">LOADING...</div>
            <div id="chance-text" style="font-size:12px; color:#4cd137; margin-top:5px; opacity:0;"></div>
        </div>
        <button class="btn-signal" id="signalBtn" onclick="getSignal()">GET SIGNAL 🍗</button>
    </div>

    <script>
        const translations = {
            en: { langTitle: "SELECT LANGUAGE", rouletteTitle: "FREE ACCESS:", spin: "SPIN", gameBtn: "GET SIGNAL 🍗", loading: "ANALYZING...", loadingAlgo: "Loading algorithms", modeLabel: "SELECT MODE", chance: "Chance:" },
            es: { langTitle: "SELECCIONE IDIOMA", rouletteTitle: "ACCESO GRATIS:", spin: "GIRAR", gameBtn: "OBTENER SEÑAL 🍗", loading: "ANALIZANDO...", loadingAlgo: "Cargando algoritmos", modeLabel: "MODO", chance: "Probabilidad:" },
            pl: { langTitle: "WYBIERZ JĘZYK", rouletteTitle: "DARMOWY BOT NA:", spin: "KRĘCIĆ", gameBtn: "OTRZYMAĆ SYGNAŁ 🍗", loading: "ANALIZOWANIE...", loadingAlgo: "Ładowanie algorytmów", modeLabel: "WYBIERZ TRYB", chance: "Szansa:" },
            ua: { langTitle: "ОБЕРІТЬ МОВУ", rouletteTitle: "БЕЗКОШТОВНИЙ БОТ НА:", spin: "КРУТИТИ", gameBtn: "ОТРИМАТИ СИГНАЛ 🍗", loading: "АНАЛІЗ...", loadingAlgo: "Завантаження алгоритмів", modeLabel: "ОБЕРІТЬ РЕЖИМ", chance: "Шанс:" },
            kz: { langTitle: "ТІЛДІ ТАҢДАҢЫЗ", rouletteTitle: "ТЕГІН БОТ:", spin: "АЙНАЛДЫРУ", gameBtn: "СИГНАЛ АЛУ 🍗", loading: "ТАЛДАУ...", loadingAlgo: "Алгоритмдерді жүктеу", modeLabel: "РЕЖИМДІ ТАҢДАҢЫЗ", chance: "Мүмкіндік:" },
            ru: { langTitle: "ВЫБЕРИТЕ ЯЗЫК", rouletteTitle: "БЕСПЛАТНЫЙ БОТ НА:", spin: "КРУТИТЬ", gameBtn: "ПОЛУЧИТЬ СИГНАЛ 🍗", loading: "АНАЛИЗ...", loadingAlgo: "Загрузка алгоритмов", modeLabel: "ВЫБЕРИТЕ РЕЖИМ", chance: "Шанс:" }
        };

        let currentLang = 'ru';
        const hasSpun = localStorage.getItem('chicken_spin_global_v3'); 

        function selectLang(lang, btnElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            document.getElementById('lang-title').innerText = translations[lang].langTitle;
            const contBtn = document.getElementById('continue-btn');
            contBtn.classList.add('active');
            contBtn.disabled = false;
        }

        function checkHistoryAndProceed() {
            document.getElementById('language-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('language-screen').style.display = 'none';
                if (hasSpun) { showGame(); } else { showRoulette(); }
            }, 500);
        }

        function showRoulette() {
            document.getElementById('roulette-header').innerText = translations[currentLang].rouletteTitle;
            document.getElementById('spin-btn-text').innerText = translations[currentLang].spin;
            initRoulette();
            document.getElementById('roulette-screen').style.display = 'flex';
            setTimeout(() => document.getElementById('roulette-screen').style.opacity = '1', 50);
        }

        function initRoulette() {
            const items = ["7 DAYS", "15 DAYS", "30 DAYS", "60 DAYS", "90 DAYS"];
            let html = "";
            for(let i=0; i<60; i++) {
                let text = items[Math.floor(Math.random() * items.length)];
                if (i === 35) text = "30 DAYS";
                html += `<div class="card" id="card-${i}">${text}</div>`;
            }
            document.getElementById('strip').innerHTML = html;
        }

        function startSpin() {
            document.querySelector('.spin-btn').style.display = 'none';
            const cardWidth = 140, gap = 15, winningIndex = 35; 
            const totalOffset = (winningIndex * (cardWidth + gap)) + (cardWidth / 2);
            const strip = document.getElementById('strip');
            strip.style.transition = "transform 4s cubic-bezier(0.15, 0.85, 0.15, 1)";
            strip.style.transform = `translateX(-${totalOffset}px)`;
            setTimeout(() => {
                document.getElementById(`card-${winningIndex}`).classList.add('winner');
                localStorage.setItem('chicken_spin_global_v3', 'true');
                setTimeout(() => {
                    document.getElementById('roulette-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('roulette-screen').style.display = 'none';
                        showGame();
                    }, 1000);
                }, 3000);
            }, 4000);
        }

        function showGame() {
            document.getElementById('signalBtn').innerText = translations[currentLang].gameBtn;
            document.getElementById('mode-label').innerText = translations[currentLang].modeLabel;
            document.getElementById('game-screen').style.display = 'flex';
            setTimeout(() => document.getElementById('game-screen').style.opacity = '1', 50);
        }

        function getSignal() {
            const btn = document.getElementById('signalBtn');
            const coef = document.getElementById('coefficient');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const chanceTxt = document.getElementById('chance-text');
            const mode = document.getElementById('mode-select').value;

            btn.disabled = true;
            btn.innerText = translations[currentLang].loading;
            coef.classList.remove('result-success');
            coef.style.opacity = "0.3";
            chanceTxt.style.opacity = "0";
            
            progressContainer.style.display = 'block';
            progressText.style.display = 'block';
            progressText.innerText = translations[currentLang].loadingAlgo + "...";
            progressBar.style.width = '0%';

            let startTime = Date.now();
            let duration = 7000;

            let interval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let progress = (elapsed / duration) * 100;
                if (progress >= 100) { clearInterval(interval); }
                else {
                    progressBar.style.width = progress + "%";
                    coef.innerText = "x" + (Math.random() * 8 + 1).toFixed(2);
                }
            }, 50);

            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressText.style.display = 'none';
                coef.style.opacity = "1";
                const mults = { easy: [1.5, 2.1], medium: [2.5, 3.8], hard: [4.2, 6.5], hardcore: [7.8, 9.9] };
                let final = (mults[mode][0] + Math.random() * (mults[mode][1] - mults[mode][0])).toFixed(2);
                coef.innerText = "x" + final;
                coef.classList.add('result-success');
                chanceTxt.innerText = translations[currentLang].chance + " " + (mode === 'easy' ? '97%' : '84%');
                chanceTxt.style.opacity = "1";
                btn.disabled = false;
                btn.innerText = translations[currentLang].gameBtn;
            }, duration);
        }
    </script>
</body>
</html>
